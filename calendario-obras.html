<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Calendario de Obras</title>
  <link rel="stylesheet" href="css/main.css?v=finance-remove-otros-tab-20260707">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="card panel calendar-panel" data-calendar-module="maintenance">
          <div class="calendar-toolbar">
            <div>
              <p class="page-kicker">Calendario de Obras / Mantenimiento</p>
              <h3 data-calendar-title>Calendario de Obras</h3>
              <p>Calendario mensual exclusivo para tareas, empleados asignados, áreas y estado de trabajos.</p>
            </div>
            <div class="calendar-actions">
              <button class="button secondary" type="button" data-calendar-prev>Mes anterior</button>
              <button class="button secondary" type="button" data-calendar-next>Mes siguiente</button>
            </div>
          </div>

          <div class="monthly-calendar" data-calendar-grid></div>

          <form class="calendar-form" data-calendar-form>
            <input type="hidden" name="id">
            <div class="form-row">
              <label class="field">
                <span>Fecha</span>
                <input type="date" name="fecha" required>
              </label>
              <label class="field">
                <span>Empleado asignado</span>
                <select name="empleado" data-employee-select required>
                  <option value="">Seleccione un empleado...</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label class="field">
                <span>Tarea del día</span>
                <input type="text" name="tarea" required>
              </label>
              <label class="field">
                <span>Área o lugar de trabajo</span>
                <input type="text" name="area">
              </label>
            </div>
            <label class="field">
              <span>Estado de la tarea</span>
              <select name="estado">
                <option>Pendiente</option>
                <option>En progreso</option>
                <option>Completado</option>
                <option>Requiere seguimiento</option>
              </select>
            </label>
            <div class="inventory-actions">
              <button class="button submit-button" type="submit" data-calendar-submit>Guardar Tarea</button>
              <button class="button secondary" type="button" data-calendar-cancel hidden>Cancelar edición</button>
            </div>
            <p class="form-message" data-calendar-message></p>
          </form>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/app.js?v=finance-remove-otros-tab-20260707"></script>
</body>
</html>
