<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Calendario de Obras</title>
  <link rel="stylesheet" href="css/main.css?v=formularios-admin-20260704">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="card panel table-panel">
          <h3>Calendario de Obras de Mantenimiento</h3>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Estado</th>
                  <th>Empleado</th>
                  <th>Dia</th>
                  <th>Entrada</th>
                  <th>Salida</th>
                  <th>Deberes</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><span class="status-dot red" aria-label="Pendiente"></span></td>
                  <td>Juan Perez</td>
                  <td>Lunes</td>
                  <td>8:00 AM</td>
                  <td>4:00 PM</td>
                  <td>Ruta completa de salas y baños</td>
                </tr>
                <tr>
                  <td><span class="status-dot green" aria-label="Completado"></span></td>
                  <td>Dora Ortiz</td>
                  <td>Martes</td>
                  <td>8:00 AM</td>
                  <td>4:00 PM</td>
                  <td>Verificacion de vitrinas y equipos</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
