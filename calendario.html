<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Calendario de Eventos del Museo</title>
  <link rel="stylesheet" href="css/main.css?v=finance-remove-otros-tab-20260707">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="card panel calendar-panel" data-calendar-module="general">
          <div class="calendar-toolbar">
            <div>
              <p class="page-kicker">Calendario de Eventos del Museo</p>
              <h3 data-calendar-title>Calendario de Eventos del Museo</h3>
              <p>Actividades, eventos y compromisos oficiales del Museo.</p>
            </div>
            <div class="calendar-actions">
              <button class="button secondary" type="button" data-calendar-prev>Mes anterior</button>
              <button class="button secondary" type="button" data-calendar-next>Mes siguiente</button>
              <button class="button submit-button" type="button" data-calendar-new>Nuevo Evento</button>
            </div>
          </div>

          <div class="monthly-calendar" data-calendar-grid></div>

          <form class="calendar-form" data-calendar-form hidden>
            <input type="hidden" name="id">
            <div class="form-row">
              <label class="field">
                <span>Fecha</span>
                <input type="date" name="fecha" required>
              </label>
              <label class="field">
                <span>Nombre del empleado que creó la actividad</span>
                <select name="empleado" data-employee-select required>
                  <option value="">Seleccione un empleado...</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label class="field">
                <span>Nombre del evento</span>
                <input type="text" name="titulo" required>
              </label>
              <label class="field">
                <span>Clasificación</span>
                <select name="clasificacion" data-activity-classification-select required>
                  <option value="">Seleccione una clasificación...</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label class="field">
                <span>Área del Museo</span>
                <select name="area" data-area-select required>
                  <option value="">Seleccione un área...</option>
                </select>
              </label>
            </div>
            <label class="field">
              <span>Descripción de la actividad</span>
              <textarea name="descripcion" rows="3"></textarea>
            </label>
            <div class="inventory-actions">
              <button class="button submit-button" type="submit" data-calendar-submit>Guardar Evento</button>
              <button class="button secondary" type="button" data-calendar-cancel hidden>Cancelar edición</button>
            </div>
            <p class="form-message" data-calendar-message></p>
          </form>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/app.js?v=finance-remove-otros-tab-20260707"></script>
</body>
</html>
