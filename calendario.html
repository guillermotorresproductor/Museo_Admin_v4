<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Calendario General</title>
  <link rel="stylesheet" href="css/main.css?v=calendarios-inventario-20260705">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="card panel calendar-panel" data-calendar-module="general">
          <div class="calendar-toolbar">
            <div>
              <p class="page-kicker">Calendario General del Museo</p>
              <h3 data-calendar-title>Calendario</h3>
              <p>Actividades, eventos y compromisos confirmados por la administraciÃ³n del Museo.</p>
            </div>
            <div class="calendar-actions">
              <button class="button secondary" type="button" data-calendar-prev>Mes anterior</button>
              <button class="button secondary" type="button" data-calendar-next>Mes siguiente</button>
            </div>
          </div>

          <div class="calendar-permissions">
            <label class="field" for="calendar-role">
              <span>Rol de usuario</span>
              <select id="calendar-role" data-calendar-role>
                <option>Empleado</option>
                <option>Ejecutivo</option>
                <option selected>Administrador</option>
              </select>
            </label>
            <p data-calendar-permission-message>Los roles Ejecutivo y Administrador pueden editar este calendario.</p>
          </div>

          <form class="calendar-form" data-calendar-form>
            <input type="hidden" name="id">
            <div class="form-row">
              <label class="field">
                <span>Fecha</span>
                <input type="date" name="fecha" required>
              </label>
              <label class="field">
                <span>Actividad o evento</span>
                <input type="text" name="titulo" required>
              </label>
            </div>
            <label class="field">
              <span>DescripciÃ³n</span>
              <textarea name="descripcion" rows="3"></textarea>
            </label>
            <div class="inventory-actions">
              <button class="button submit-button" type="submit" data-calendar-submit>Guardar Evento</button>
              <button class="button secondary" type="button" data-calendar-cancel hidden>Cancelar ediciÃ³n</button>
            </div>
            <p class="form-message" data-calendar-message></p>
          </form>

          <div class="monthly-calendar" data-calendar-grid></div>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/app.js?v=calendarios-inventario-20260705"></script>
</body>
</html>
