<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Solicitud de Empleo</title>
  <link rel="stylesheet" href="css/main.css?v=finance-remove-otros-tab-20260707">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="page-hero">
          <div>
            <p class="page-kicker">Formulario oficial</p>
            <h2>Solicitud de Empleo</h2>
            <p>Formulario para candidatos del Museo de la Música de Puerto Rico.</p>
          </div>
        </section>

        <section class="card panel form-panel">
          <h3>Solicitud de Empleo</h3>
          <form class="application-form" action="#" method="post" enctype="multipart/form-data">
            <div class="form-row">
              <div class="field">
                <label for="nombre">Nombre completo</label>
                <input id="nombre" name="nombre" type="text" autocomplete="name">
              </div>
              <div class="field">
                <label for="direccion">Dirección</label>
                <input id="direccion" name="direccion" type="text" autocomplete="street-address">
              </div>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="telefono">Teléfono</label>
                <input id="telefono" name="telefono" type="tel" autocomplete="tel">
              </div>
              <div class="field">
                <label for="correo">Correo electrónico</label>
                <input id="correo" name="correo" type="email" autocomplete="email">
              </div>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="puesto">Puesto solicitado</label>
                <select id="puesto" name="puesto">
                  <option value="">Seleccione...</option>
                  <option value="administracion">Administración</option>
                  <option value="mantenimiento">Mantenimiento</option>
                  <option value="guia">Guía de museo</option>
                  <option value="boleteria">Boletería</option>
                  <option value="ujier">Ujier</option>
                  <option value="otro">Otro</option>
                </select>
              </div>
              <div class="field">
                <label for="resume">Resumé PDF</label>
                <input id="resume" name="resume" type="file" accept="application/pdf">
              </div>
            </div>
            <div class="field">
              <label for="experiencia">Experiencia</label>
              <textarea id="experiencia" name="experiencia" rows="5"></textarea>
            </div>
            <button class="button submit-button" type="submit">Enviar solicitud</button>
          </form>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/app.js?v=finance-remove-otros-tab-20260707"></script>
</body>
</html>
