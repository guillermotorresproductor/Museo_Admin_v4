<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Perfil de Empleado</title>
  <link rel="stylesheet" href="css/main.css?v=supabase-finance-session-fix-20260705">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="card panel employee-profile">
          <div class="profile-heading">
            <div class="employee-photo-card">
              <span class="employee-avatar large" data-profile-avatar>GT</span>
              <img class="employee-photo-preview" src="" alt="Foto del empleado" data-employee-photo hidden>
              <label class="photo-upload-button" for="employee-photo-input">Subir foto</label>
              <input id="employee-photo-input" class="photo-input" type="file" accept="image/*" data-employee-photo-input>
              <button class="photo-remove-button" type="button" data-employee-photo-remove hidden>Eliminar foto</button>
            </div>
            <div>
              <p class="page-kicker">Perfil Administrativo</p>
              <h3 data-profile-name>Guillermo Torres</h3>
              <p data-profile-position>Administrador</p>
              <p class="profile-photo-note" data-employee-photo-message>La foto servirá como identificación visual del récord del empleado.</p>
            </div>
          </div>

          <div class="profile-grid section-stack">
            <label class="field">
              <span>Nombre</span>
              <input type="text" data-profile-field="nombre">
            </label>

            <label class="field">
              <span>Apellidos</span>
              <input type="text" data-profile-field="apellidos">
            </label>

            <label class="field">
              <span>Dirección</span>
              <input type="text" data-profile-field="direccion">
            </label>

            <label class="field">
              <span>Teléfono</span>
              <input type="tel" data-profile-field="telefono">
            </label>

            <label class="field">
              <span>Correo electrónico</span>
              <input type="email" data-profile-field="correo">
            </label>

            <label class="field">
              <span>Educación</span>
              <select data-profile-field="educacion">
                <option>Estudiante</option>
                <option>Graduado</option>
                <option>Post graduado</option>
              </select>
            </label>

            <label class="field">
              <span>Condición médica</span>
              <input type="text" data-profile-field="condicion">
            </label>

            <label class="field">
              <span>Puesto</span>
              <input type="text" data-profile-field="posicion">
            </label>

            <label class="field">
              <span>Departamento</span>
              <input type="text" data-profile-field="departamento">
            </label>

            <label class="field">
              <span>Fecha de contratación</span>
              <input type="date" data-profile-field="fechaContratacion">
            </label>

            <label class="field">
              <span>Horario asignado de trabajo</span>
              <input type="text" data-profile-field="horario">
            </label>

            <label class="field">
              <span>Nombre de usuario</span>
              <input type="text" data-profile-field="usuario">
            </label>

            <label class="field">
              <span>Estado</span>
              <select data-profile-field="estado">
                <option>Activo</option>
                <option>Inactivo</option>
              </select>
            </label>

            <label class="field">
              <span>Nivel de acceso</span>
              <select data-profile-field="acceso">
                <option>Empleado</option>
                <option>Ejecutivo</option>
                <option>Administrador</option>
              </select>
            </label>

            <label class="field">
              <span>Notificaciones</span>
              <textarea data-profile-field="notificaciones" rows="4"></textarea>
            </label>
          </div>
          <div class="inventory-actions">
            <button class="button submit-button" type="button" data-profile-save>Guardar cambios</button>
            <a class="button secondary" href="recursos-humanos.html">Volver al directorio</a>
          </div>
          <p class="form-message" data-profile-message></p>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/app.js?v=supabase-finance-session-fix-20260705"></script>
</body>
</html>
