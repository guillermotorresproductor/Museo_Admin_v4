<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Recibo de Préstamo</title>
  <link rel="stylesheet" href="css/main.css?v=encoding-papeleria-20260708">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="card panel form-panel rental-panel">
          <h3>Formulario Digital de Recibo de Artículos de Colección Mediante Préstamo</h3>
          <div class="request-meta">
            <div>
              <span>Número interno del artículo</span>
              <strong data-loan-article-number>Artículo 00001</strong>
            </div>
            <div>
              <span>Fecha de emisión</span>
              <strong data-loan-article-date></strong>
            </div>
          </div>
          <form id="loan-receipt-form" class="application-form" action="#" method="post" novalidate>
            <div class="form-row">
              <div class="field">
                <label for="loan-lender">Nombre del prestamista</label>
                <input id="loan-lender" name="prestamista" type="text" autocomplete="name" required>
              </div>
              <div class="field">
                <label for="loan-email">Correo electrónico</label>
                <input id="loan-email" name="correo" type="email" autocomplete="email" required>
              </div>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="loan-phone">Teléfono</label>
                <input id="loan-phone" name="telefono" type="tel" autocomplete="tel" required>
              </div>
              <div class="field">
                <label for="loan-date">Fecha de recibo</label>
                <input id="loan-date" name="fecha" type="date" required>
              </div>
            </div>
            <div class="field">
              <label for="loan-address">Dirección postal</label>
              <input id="loan-address" name="direccion" type="text" autocomplete="street-address" required>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="loan-item-name">Nombre o título del artículo</label>
                <input id="loan-item-name" name="articulo" type="text" required>
              </div>
              <div class="field">
                <label for="loan-category">Categoría</label>
                <select id="loan-category" name="categoria" required>
                  <option value="">Seleccione...</option>
                  <option>Instrumento musical</option>
                  <option>Fotografía</option>
                  <option>Documento</option>
                  <option>Vestuario</option>
                  <option>Memorabilia</option>
                  <option>Equipo electrónico</option>
                  <option>Otro</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="loan-description">Descripción detallada del artículo</label>
              <textarea id="loan-description" name="descripcion" rows="5" required></textarea>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="loan-condition">Condición al momento del recibo</label>
                <select id="loan-condition" name="condicion" required>
                  <option value="">Seleccione...</option>
                  <option>Excelente</option>
                  <option>Buena</option>
                  <option>Regular</option>
                  <option>Requiere evaluación</option>
                </select>
              </div>
              <div class="field">
                <label for="loan-value">Valor estimado</label>
                <input id="loan-value" name="valor" type="text" required>
              </div>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="loan-start">Fecha de inicio del préstamo</label>
                <input id="loan-start" name="inicio" type="date" required>
              </div>
              <div class="field">
                <label for="loan-end">Fecha estimada de devolución</label>
                <input id="loan-end" name="devolucion" type="date" required>
              </div>
            </div>
            <div class="field">
              <label for="loan-purpose">Propósito del préstamo</label>
              <textarea id="loan-purpose" name="proposito" rows="4" required></textarea>
            </div>
            <div class="field">
              <label for="loan-notes">Observaciones adicionales</label>
              <textarea id="loan-notes" name="observaciones" rows="4"></textarea>
            </div>
            <label class="terms-accept">
              <input id="loan-certification" name="certificacion" type="checkbox" required>
              <span>Certifico que la información suministrada es correcta y autorizo al Museo a evaluar el recibo del artículo mediante préstamo.</span>
            </label>
            <p class="form-message" data-loan-message aria-live="polite"></p>
            <button class="button submit-button" type="submit">Enviar formulario</button>
          </form>
        </section>

        <section class="card panel section-stack">
          <h3>Documento descargable</h3>
          <p>Si necesita completar la versión en papel, descargue el formulario oficial existente en formato Word.</p>
          <a class="button secondary section-stack" href="docs/formulario-recibo-articulos-coleccion-prestamo.docx" download>Descargar formulario Word</a>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/services/supabase.js?v=identity-invite-20260721"></script>
  <script src="js/app.js?v=encoding-papeleria-20260708"></script>
</body>
</html>
