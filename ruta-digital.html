<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Ruta Digital de Mantenimiento</title>
  <link rel="stylesheet" href="css/main.css?v=deposito-artes-20260708">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="card panel form-panel">
          <h3>Ruta Digital de Mantenimiento</h3>
          <form class="application-form" action="#" method="post">
            <div class="form-row">
              <div class="field">
                <label for="empleado-ruta">Empleado de Mantenimiento</label>
                <select id="empleado-ruta" name="empleado" data-employee-select data-employee-filter="Mantenimiento">
                  <option value="">Seleccione un empleado...</option>
                </select>
              </div>
              <div class="field">
                <label for="area-ruta">Área del Museo</label>
                <select id="area-ruta" name="area" data-area-select>
                  <option value="">Seleccione un área...</option>
                </select>
              </div>
            </div>
            <label class="check-row"><span>Verificación de vitrinas</span><input type="checkbox" name="ruta" value="vitrinas"></label>
            <label class="check-row"><span>Verificación de equipos</span><input type="checkbox" name="ruta" value="equipos"></label>
            <label class="check-row"><span>Manchas o daños</span><input type="checkbox" name="ruta" value="daños"></label>
            <label class="check-row"><span>Evaluación del área de exhibición</span><input type="checkbox" name="ruta" value="exhibicion"></label>
            <label class="check-row"><span>Limpieza de sala</span><input type="checkbox" name="ruta" value="limpieza"></label>
            <div class="field">
              <label for="observaciones-ruta">Observaciones</label>
              <textarea id="observaciones-ruta" name="observaciones" rows="4"></textarea>
            </div>
            <button class="button submit-button pale-button" type="submit">Registrar Inspección</button>
          </form>
        </section>
        <section class="card panel section-stack table-panel">
          <h3>Historial</h3>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Hora</th>
                  <th>Empleado</th>
                  <th>Área</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>01/07/2026</td>
                  <td>8:35 AM</td>
                  <td>Juan Pérez</td>
                  <td>Lobby</td>
                  <td><span class="status-dot green"></span> Completado</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/app.js?v=deposito-artes-20260708"></script>
</body>
</html>
