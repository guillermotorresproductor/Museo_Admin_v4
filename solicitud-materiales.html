<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Solicitud de Materiales</title>
  <link rel="stylesheet" href="css/main.css?v=user-menu-logout-idle-20260708">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="card panel form-panel" data-materials-module>
          <h3>Solicitud de Materiales</h3>
          <div class="request-meta">
            <div>
              <span>Número de pedido</span>
              <strong data-material-order-number>Pedido 00001</strong>
            </div>
            <div>
              <span>Fecha del pedido</span>
              <strong data-material-order-date></strong>
            </div>
          </div>
          <form class="application-form" action="#" method="post" data-materials-form>
            <div class="field">
              <label for="empleado-materiales">Empleado</label>
              <select id="empleado-materiales" name="empleado" data-employee-select>
                <option value="">Seleccione un empleado...</option>
              </select>
            </div>
            <label class="check-row"><span>Limpiador</span><input type="checkbox" name="materiales" value="Limpiador"></label>
            <label class="check-row"><span>Paños</span><input type="checkbox" name="materiales" value="Paños"></label>
            <label class="check-row"><span>Cepillos</span><input type="checkbox" name="materiales" value="Cepillos"></label>
            <label class="check-row"><span>Escobas</span><input type="checkbox" name="materiales" value="Escobas"></label>
            <label class="check-row"><span>Mapos</span><input type="checkbox" name="materiales" value="Mapos"></label>
            <label class="check-row"><span>Papel Higiénico</span><input type="checkbox" name="materiales" value="Papel Higiénico"></label>
            <label class="check-row"><span>Jabón de Baño</span><input type="checkbox" name="materiales" value="Jabón de Baño"></label>
            <div class="field">
              <label for="materiales-otros">Otros materiales necesarios</label>
              <textarea id="materiales-otros" name="otros" rows="4" placeholder="Escriba aquí cualquier material que no aparezca en la lista."></textarea>
            </div>
            <button class="button submit-button" type="submit">Solicitar</button>
            <p class="form-message" data-materials-message></p>
          </form>
        </section>
        <section class="card panel section-stack" data-materials-log-panel>
          <h3>Log de Solicitudes</h3>
          <div class="materials-log" data-materials-log></div>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/app.js?v=user-menu-logout-idle-20260708"></script>
</body>
</html>
