<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo Admin v4.0 | Ujieres</title>
  <link rel="stylesheet" href="css/main.css?v=deposito-artes-20260708">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>
    <div class="main-area">
      <header class="site-header" data-header></header>
      <main class="page-content">
        <section class="card panel calendar-panel" data-calendar-module="ushers">
          <div class="calendar-toolbar">
            <div>
              <p class="page-kicker">Calendario de Ujieres</p>
              <h3 data-calendar-title>Calendario de Ujieres</h3>
              <p>Asignaciones mensuales de ujieres, horarios y áreas oficiales del Museo.</p>
            </div>
            <div class="calendar-actions">
              <button class="button secondary" type="button" data-calendar-prev>Mes anterior</button>
              <button class="button secondary" type="button" data-calendar-next>Mes siguiente</button>
              <button class="button submit-button" type="button" data-calendar-new>Nueva Entrada</button>
            </div>
          </div>

          <div class="monthly-calendar" data-calendar-grid></div>

          <form class="calendar-form" data-calendar-form hidden>
            <input type="hidden" name="id">
            <div class="form-row">
              <label class="field">
                <span>Fecha</span>
                <input type="date" name="fecha" required>
              </label>
              <label class="field">
                <span>Nombre del ujier</span>
                <select name="ujier" data-usher-select required>
                  <option value="">Seleccione un ujier...</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label class="field">
                <span>Horario</span>
                <input type="text" name="horario" placeholder="8:00 AM - 12:00 PM" required>
              </label>
              <label class="field">
                <span>Área del Museo</span>
                <select name="area" data-area-select required>
                  <option value="">Seleccione un área...</option>
                </select>
              </label>
            </div>
            <div class="inventory-actions">
              <button class="button submit-button" type="submit" data-calendar-submit>Guardar Asignación</button>
              <button class="button secondary" type="button" data-calendar-cancel hidden>Cancelar edición</button>
            </div>
            <p class="form-message" data-calendar-message></p>
          </form>
        </section>
      </main>
      <footer class="site-footer" data-footer></footer>
    </div>
  </div>
  <script src="js/app.js?v=deposito-artes-20260708"></script>
</body>
</html>
